<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | ScCross</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .container {
            max-width: 600px;
            padding: 0 20px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 700;
            background: linear-gradient(90deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #e2e8f0;
        }
        
        p {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        
        .btn-home {
            display: inline-block;
            background: linear-gradient(90deg, #0ea5e9, #0d9488);
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
            margin: 0 10px;
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }
        
        .btn-retry {
            display: inline-block;
            background: rgba(30, 41, 59, 0.7);
            color: #e2e8f0;
            border: 1px solid #334155;
            padding: 14px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            margin: 0 10px;
        }
        
        .btn-retry:hover {
            background: rgba(51, 65, 85, 0.5);
            transform: translateY(-3px);
        }
        
        .dna-icon {
            font-size: 48px;
            color: #ef4444;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <canvas id="backgroundCanvas" class="background-canvas"></canvas>
    
    <div class="container">
        <div class="dna-icon">
            <i class="fas fa-dna"></i>
        </div>
        <div class="error-code">500</div>
        <h1>Internal Server Error</h1>
        <p>Something went wrong on our end. Please try again later or contact support if the problem persists.</p>
        <div>
            <a href="/" class="btn-home"><i class="fas fa-home"></i> Back to Home</a>
            <a href="javascript:location.reload()" class="btn-retry"><i class="fas fa-sync"></i> Try Again</a>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('backgroundCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        class CellPoint {
            constructor() {
                this.reset();
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 0.3 + 0.1;
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * this.speed;
                this.vy = (Math.random() - 0.5) * this.speed;
                this.color = this.getRandomColor();
                this.life = Math.random() * 200 + 100;
            }
            
            getRandomColor() {
                const colors = [
                    'rgba(239, 68, 68, 0.5)',
                    'rgba(249, 115, 22, 0.5)',
                    'rgba(245, 158, 11, 0.5)'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                this.life--;
                if (this.life <= 0) this.reset();
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }
        
        const points = [];
        for (let i = 0; i < 100; i++) points.push(new CellPoint());
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, canvas.width
            );
            gradient.addColorStop(0, 'rgba(15, 23, 42, 0.9)');
            gradient.addColorStop(1, 'rgba(15, 23, 42, 1)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            points.forEach(point => {
                point.update();
                point.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
